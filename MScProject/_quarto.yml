project:
  type: book
  output-dir: .

book:
  title: "Measuring Technical Debt in Mission Critical Trading Systems"
  subtitle: "A Service Level Quantitative Framework"
  date: "21 April 2026"
  author:
    name: Tobias Zeier
  abstract: "This thesis develops a service-level quantitative framework for measuring and prioritising technical debt in mission-critical trading systems. Existing measurement approaches rely predominantly on static code analysis, which is inapplicable to vendor-dominated enterprise environments where operational risks manifest in service instability, patch delay and infrastructure obsolescence rather than source code. The framework applies TOPSIS to four operational indicators, incident frequency, mean time to restore, change failure rate and patch recency, derived from live ITSM and CMDB records at a Swiss securities trading institution. Indicator selection is grounded in a critical review of technical debt theory, measurement frameworks, financial enterprise IT governance, and multi-criteria decision-making. The study adopts a Design Science Research paradigm and a pragmatist stance, treating the relationship between degraded operational indicators and technical debt severity as a testable hypothesis rather than an established premise. The framework's evaluation centres on ranking stability under criterion weight perturbation, contributing a reproducible prioritisation instrument that bridges IT service management and software quality engineering in a domain currently underserved by the technical debt literature."
  chapters:
    - index.qmd
    - references.qmd
  
  appendices: 
    - appendices/appendixa.qmd

thesis:
  supervisor:
    name: "Dr Zahid Ullah"
  co-supervisor:
    name: "Doug Millward"
  degree-name: "Master of Science"
  university: "University of Essex Online"
  department: "Computing Department"
  group: "Enterprise IT Management Programme"
  declaration: "Frontmatter/declaration.tex"
  acknowledgements: "Frontmatter/acknowledgements.tex"
  abbreviations: "Frontmatter/abbreviations.tex"
  symbols: "Frontmatter/symbols.tex"
  logo: "images/logo.png"
  logo-height: "2.5cm"

bibliography: references.bib
csl: harvard-cite-them-right-no-et-al.csl

execute:
  echo: false
  warning: false
  message: false

toclinkcolor: black

format:
  pdf:
    documentclass: MastersDoctoralThesis
    classoption: ["12pt", "oneside", "english", "onehalfspacing", "headsepline"]
    fontsize: 12pt
    linestretch: 1.5
    geometry:
      - paper=a4paper
      - inner=2.5cm
      - outer=3.8cm
      - top=2cm
      - bottom=2cm
    template-partials:
      - title.tex
      - before-body.tex
    include-before-body:
      - definitions.tex
    include-in-header:
      - preamble.tex
    keep-tex: true
    toc: false
    toc-depth: 2
    number-sections: true
    crossref:
      chapters: true
    top-level-division: chapter
    colorlinks: true
    urlcolor: blue
    linkcolor: black
    citecolor: black
