project:
  type: book

book:
  title: "Measuring Technical Debt in Mission Critical Trading Systems"
  subtitle: "A Service Level Quantitative Framework"
  author: "Tobias Zeier"
  date: "10 August 2026"
  date-format: DD MMMM YYYY
  chapters:
    - index.qmd
    - chapters.qmd

format:
  pdf:
    documentclass: report
    papersize: a4
    fontsize: 12pt
    linestretch: 1.5
    geometry:
      - top=30mm
      - left=30mm
      - right=30mm
      - bottom=30mm
    template-partials:
      - before-body.tex
    include-in-header:
      - preamble.tex
    keep-tex: true

lang: en-GB

execute:
  echo: false
  warning: false
  message: false